<!DOCTYPE html>
<html>

<head>

    <title>Login | Pinch Of Yum</title>

    <link rel="stylesheet" href="../css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Lobster&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #111, #000);
            font-family: Poppins, sans-serif;
        }

        /* 🍝 BRAND TITLE */
        .brand-title {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-size: 52px;
            font-family: 'Lobster', cursive;
            color: #FF6B00;
            letter-spacing: 2px;
            text-shadow: 0 5px 20px rgba(255, 107, 0, 0.4);
        }

        /* CONTAINER */
        .auth-container {
            display: flex;
            width: 900px;
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
        }

        .auth-left {
            flex: 1;
            background: url("https://images.unsplash.com/photo-1498837167922-ddd27525d352") center/cover;
            position: relative;
        }

        .auth-left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .auth-right {
            flex: 1;
            padding: 50px;
        }

        .auth-right h2 {
            color: #FF6B00;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: none;
            border-radius: 8px;
            background: #1c1c1c;
            color: white;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.6);
        }

        /* PASSWORD WRAPPER */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
    position: absolute;
    right: 1px;
    top: 35%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #aaa;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.toggle-password:hover {
    color: #FF6B00;
}

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B00, #ff8c42);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover {
            transform: none;
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.25);
        }

        .switch {
            margin-top: 18px;
            color: #aaa;
            cursor: pointer;
        }

        .switch:hover {
            color: #FF6B00;
        }

        .error {
            color: #ff4d4d;
            margin-bottom: 10px;
        }
        input {
    border: 1px solid transparent;
}

input:focus {
    border: 1px solid #FF6B00;
}

        @media(max-width:768px) {
            .auth-container {
                flex-direction: column;
                width: 90%;
            }

            .auth-left {
                height: 200px;
            }

            .brand-title {
                font-size: 36px;
            }
        }
    </style>

</head>

<body>

    <!-- 🍝 BRAND -->
    <div class="brand-title">Pinch Of Yum</div>

    <div class="auth-container">

        <div class="auth-left"></div>

        <div class="auth-right">

            <h2 id="formTitle">Welcome Back 👋</h2>

            <div id="errorMsg" class="error"></div>

            <input type="text" id="username" placeholder="Enter Username">

            <!-- 👁 PASSWORD FIELD -->
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter Password">
                <span class="toggle-password" onclick="togglePassword()">
    <i class="fa-solid fa-eye"></i>
</span>
            </div>

            <button onclick="login()">Login</button>

            <p class="switch" onclick="toggleForm()">
                Don't have an account? Register
            </p>

        </div>

    </div>

    <script>
       function togglePassword() {
    const pass = document.getElementById("password");
    const icon = document.querySelector(".toggle-password i");

    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
    </script>

    <script src="../js/auth.js"></script>

</body>

</html>
